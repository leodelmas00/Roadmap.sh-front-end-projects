<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Faster+One&family=Figtree:ital,wght@0,300..900;1,300..900&family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
    <title>cookie-consent</title>
</head>
<body>
    <div class="container">
        <h1>Awesome page</h1>
        <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Molestias, quisquam quasi. Animi dignissimos accusamus quaerat quae eveniet iusto molestiae alias ducimus exercitationem, error minima possimus porro a, sint ab velit!</p>
    </div>
    <div id="overlay" class="overlay"></div>
    <div id="cookiePopup" class="popup">
        <img src="cookie-solid.svg" alt="Cookie image">
        <p>We use cookies to improve your user experience.</p>
        <div class="buttons">
            <button onclick="rejectCookie()">Reject</button>
            <button onclick="acceptCookie()">I like cookies</button>
        </div>
    </div>
</body>
</html>
