<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>image-grid</title>
</head>

<body>
    <div class="container">
        <div class="image-grid">
            <div class="box" style="grid-area:  box-1"><img src="media/FogyBeach.jpg" alt="a image"></div>
            <div class="box" style="grid-area:  box-2"><img src="media/LivingRoom.jpg" alt="a image"></div>
            <div class="box" style="grid-area:  box-3"><img src="media/Food.jpg" alt="a image"></div>
            <div class="box" style="grid-area:  box-4"><img src="media/Door.jpg" alt="a image"></div>
            <div class="box" style="grid-area:  box-5"><img src="media/Apartaments.jpg" alt="a image"></div>
            <div class="box" style="grid-area:  box-6"><img src="media/Beach.jpg" alt="a image"></div>
        </div>
    </div>
</body>
</html>
