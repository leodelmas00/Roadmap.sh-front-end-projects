<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Delius&family=Faster+One&family=Figtree:ital,wght@0,300..900;1,300..900&family=Quicksand:wght@300..700&family=Sour+Gummy:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>flash-cards</title>
</head>
<body>
    <h1>Flash cards</h1>
    <div class="container">

        <div class="progress-container">
            <div id= "progressBar" class="progress-bar"></div>
            <p id="progressText">1 / 10</p>
        </div>
        
        <div class="card">
            <button>
                <p class="question">¿Qué significa HTML?</p>
                <p class="answer">Significa HyperText Markup Language, el lenguaje de marcado usado para estructurar el contenido de las páginas web.</p>
            </button>
        </div>

        <div class="card">
            <button>
                <p class="question">¿Para qué se usa HTML?</p>
                <p class="answer">Se usa para definir la estructura de una página web, como títulos, párrafos, imágenes, enlaces y botones.</p>
            </button>
        </div>

        <div class="card">
            <button>
                <p class="question">¿Para qué se usa CSS?</p>
                <p class="answer">CSS se usa para dar estilo a los elementos HTML, como colores, tamaños, márgenes, posiciones y diseño visual.</p>
            </button>
        </div>

        <div class="card">
            <button>
                <p class="question">¿Qué hace JavaScript en una página web?</p>
                <p class="answer">JavaScript permite agregar interactividad, como responder a clics, modificar contenido dinámicamente o validar formularios.</p>
            </button>
        </div>

        <div class="card">
            <button>
                <p class="question">¿Qué etiqueta HTML se usa para conectar un archivo CSS?</p>
                <p class="answer">Se usa la etiqueta link dentro del head para cargar una hoja de estilos externa.</p>
            </button>
        </div>

        <div class="card">
            <button>
                <p class="question">¿Qué propiedad de CSS cambia el color del texto?</p>
                <p class="answer">La propiedad color se usa para definir el color del texto de un elemento.</p>
            </button>
        </div>

        <div class="card">
            <button>
                <p class="question">¿Qué propiedad de CSS cambia el color de fondo?</p>
                <p class="answer">La propiedad background-color permite cambiar el color del fondo de un elemento HTML.</p>
            </button>
        </div>

        <div class="card">
            <button>
                <p class="question">¿Qué hace display: flex en CSS?</p>
                <p class="answer">Activa Flexbox, un sistema de diseño que permite alinear y distribuir elementos fácilmente dentro de un contenedor.</p>
            </button>
        </div>

        <div class="card">
            <button>
                <p class="question">¿Qué método de JavaScript selecciona un elemento por id?</p>
                <p class="answer">document.getElementById() permite obtener un elemento HTML específico usando su atributo id.</p>
            </button>
        </div>

        <div class="card">
            <button>
                <p class="question">¿Qué significa DOM?</p>
                <p class="answer">DOM significa Document Object Model, una representación de la página que JavaScript puede usar para leer y modificar el contenido HTML.</p>
            </button>
        </div>

        <div class="directions">
            <button id="previous">Previous</button>
            <button id="next">Next</button>
        </div>
        
    </div>

    <script src="script.js"></script>
</body>
</html>
